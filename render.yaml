services:
  - type: web
    runtime: python
    name: dialbox-api
    rootDir: backend
    plan: free
    autoDeployTrigger: checksPass
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn production:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DB_NAME
        value: dialbox
      - key: MONGO_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true

  - type: web
    runtime: static
    name: dialbox-web
    rootDir: frontend
    autoDeployTrigger: checksPass
    buildCommand: corepack enable && corepack prepare yarn@1.22.22 --activate && yarn install --non-interactive && CI=false yarn build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          type: web
          name: dialbox-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: REACT_APP_ENABLE_DEV_TOOLS
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
