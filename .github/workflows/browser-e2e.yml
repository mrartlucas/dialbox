name: Browser E2E smoke test

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "e2e/**"
      - ".github/workflows/browser-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Chromium with FastAPI and MongoDB
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            e2e/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Yarn 1.22.22
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Install backend and E2E dependencies
        run: pip install -r backend/requirements.txt -r e2e/requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Install frontend dependencies
        run: yarn --cwd frontend install --non-interactive

      - name: Start FastAPI backend
        env:
          MONGO_URL: mongodb://127.0.0.1:27017
          DB_NAME: dialbox_e2e
          CORS_ORIGINS: http://127.0.0.1:3000
          EMERGENT_LLM_KEY: e2e-placeholder-key
        run: |
          cd backend
          python -m uvicorn server:app --host 127.0.0.1 --port 8000 > ../e2e/backend.log 2>&1 &
          echo $! > ../e2e/backend.pid

      - name: Wait for backend
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/api/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat e2e/backend.log
          exit 1

      - name: Start React frontend
        env:
          BROWSER: none
          CI: false
          HOST: 127.0.0.1
          PORT: 3000
          REACT_APP_BACKEND_URL: http://127.0.0.1:8000
        run: |
          yarn --cwd frontend start > e2e/frontend.log 2>&1 &
          echo $! > e2e/frontend.pid

      - name: Wait for frontend
        run: |
          for attempt in {1..90}; do
            if curl --fail --silent http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat e2e/frontend.log
          exit 1

      - name: Run browser smoke test
        run: pytest -q e2e/test_browser_smoke.py

      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-evidence
          path: |
            e2e/artifacts/**
            e2e/backend.log
            e2e/frontend.log
          if-no-files-found: warn
          retention-days: 7
